name: Build libusb (macOS)
run-name: "Build libusb (macOS) - ${{ inputs.libusb_repo }}@${{ inputs.libusb_ref }}"

on:
  workflow_dispatch:
    inputs:
      libusb_repo:
        description: "GitHub repo for libusb (owner/name)"
        default: "libusb/libusb"
        type: string
        required: true
      libusb_ref:
        description: "git ref for libusb (tag/branch/commit)"
        default: "v1.0.29"
        type: string
        required: true

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # Visit github-hosted-runners page for reference:
        # https://docs.github.com/en/actions/reference/runners/github-hosted-runners
        include:
          # macOS native
          - name: macOS arm64
            runner: macos-latest
            platform: macos
            arch: arm64
            macos_deployment: "11.0"
          - name: macOS x64
            runner: macos-15-intel
            platform: macos
            arch: x86_64
            macos_deployment: "11.0"

          # Mac Catalyst (macabi)
          - name: Mac Catalyst arm64 (macabi)
            runner: macos-latest
            platform: mac-catalyst
            arch: arm64
            ios_target: "15.0"
          - name: Mac Catalyst x64 (macabi)
            runner: macos-15-intel
            platform: mac-catalyst
            arch: x86_64
            ios_target: "15.0"

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    env:
      LIBUSB_REPO: ${{ github.event.inputs.libusb_repo }}
      LIBUSB_REF: ${{ github.event.inputs.libusb_ref }}
      SRC_DIR:   ${{ github.workspace }}/libusb
      BUILD_DIR: ${{ github.workspace }}/build
      STAGE_DIR: ${{ github.workspace }}/stage

    steps:
      - name: Validate inputs
        shell: bash
        run: |
          if [[ ! "$LIBUSB_REPO" =~ ^[a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+$ ]]; then
            echo "::error::Invalid libusb_repo format: must be 'owner/name'"
            exit 1
          fi
          if [[ ! "$LIBUSB_REF" =~ ^[a-zA-Z0-9._/-]+$ ]]; then
            echo "::error::Invalid libusb_ref format: must be a valid git ref"
            exit 1
          fi

      - name: Checkout (this repo)
        uses: actions/checkout@v6

      - name: Fetch libusb source
        run: |
          git init "$SRC_DIR" && cd "$SRC_DIR"
          git remote add origin "https://github.com/${LIBUSB_REPO}.git"
          git fetch --depth=1 origin "$LIBUSB_REF" || git fetch origin "$LIBUSB_REF"
          git checkout FETCH_HEAD
          echo "libusb ref:"; git rev-parse --short HEAD

      - name: Print tool versions
        run: |
          uname -a
          xcodebuild -version
          clang --version

      - name: Install build deps (autotools, libtool, pkg-config)
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1  # makes installs faster & less flaky on runners
          HOMEBREW_NO_INSTALL_CLEANUP: 1
        run: |
          set -euxo pipefail
          brew list autoconf    >/dev/null 2>&1 || brew install autoconf
          brew list automake    >/dev/null 2>&1 || brew install automake
          brew list libtool     >/dev/null 2>&1 || brew install libtool
          brew list pkg-config  >/dev/null 2>&1 || brew install pkg-config

      - name: Prepare build folders
        run: |
          rm -rf "$BUILD_DIR" "$STAGE_DIR"
          mkdir -p "$BUILD_DIR" "$STAGE_DIR"

      # ---------- macOS (Autotools -> dynamic .dylib) ----------
      - name: Build libusb macOS (${{ matrix.arch }})
        if: matrix.platform == 'macos'
        working-directory: ${{ env.SRC_DIR }}
        shell: bash
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_deployment }}
        run: |
          set -euxo pipefail
          ./autogen.sh
          export CC="clang -arch ${{ matrix.arch }}"
          export CFLAGS="-O2 -pipe"
          export LDFLAGS="-Wl,-headerpad_max_install_names -Wl,-install_name,@rpath/libusb-1.0.dylib"
          ./configure --disable-dependency-tracking --prefix="${STAGE_DIR}/macos-${{ matrix.arch }}"
          make -j"$(sysctl -n hw.ncpu)"
          make install

          # Package headers + dynamic lib (and static if produced)
          tar -czf "${BUILD_DIR}/libusb-macos-${{ matrix.arch }}.tar.gz" -C "${STAGE_DIR}" "macos-${{ matrix.arch }}"

      # ---------- Mac Catalyst (macabi -> dynamic .dylib) ----------
      - name: Build libusb Catalyst (${{ matrix.arch }}) dynamic
        if: matrix.platform == 'mac-catalyst'
        shell: bash
        run: |
          set -euxo pipefail
          SDK="$(xcrun --sdk macosx --show-sdk-path)"
          SRC="${SRC_DIR}/libusb"
          OBJ_DIR="${BUILD_DIR}/obj-macabi-${{ matrix.arch }}"
          PREFIX="${STAGE_DIR}/maccatalyst-${{ matrix.arch }}"
          mkdir -p "$OBJ_DIR" "$PREFIX/include/libusb-1.0" "$PREFIX/lib"

          # Minimal config header (bypassing autotools for macabi)
          printf '%s\n' \
            '#define PLATFORM_POSIX 1' \
            '#define OS_DARWIN 1' \
            '#define DEFAULT_VISIBILITY __attribute__((visibility("default")))' \
            '#define DEFAULT_LOG_LEVEL 3' \
            '#define THREADS_POSIX 1' \
            '#define HAVE_MACH_ABSOLUTE_TIME 1' \
            '#define HAVE_CLOCK_GETTIME 1' \
            '#define HAVE_POLL 1' \
            > "${SRC}/config.h"

          # Patch out APIs unavailable in Mac Catalyst (hard error, can't suppress with flags)
          sed -i '' 's/kresult = IOServiceAuthorize.*/kresult = KERN_SUCCESS; \/\/ macabi: patched out unavailable API/' "${SRC}/os/darwin_usb.c"

          TARGET="${{ matrix.arch }}-apple-ios${{ matrix.ios_target }}-macabi"
          COMMON="-isysroot ${SDK} -target ${TARGET} -I${SRC} -O2 -fPIC -DHAVE_CONFIG_H"

          CORE_SRCS=(
            "${SRC}/core.c" "${SRC}/descriptor.c" "${SRC}/hotplug.c"
            "${SRC}/io.c"   "${SRC}/strerror.c"   "${SRC}/sync.c"
            "${SRC}/os/threads_posix.c" "${SRC}/os/events_posix.c"
          )
          DARWIN_SRCS=("${SRC}/os/darwin_usb.c")

          OBJ=()
          for f in "${CORE_SRCS[@]}" "${DARWIN_SRCS[@]}"; do
            o="${OBJ_DIR}/$(basename "${f%.c}").o"
            clang $COMMON -c "$f" -o "$o"
            OBJ+=("$o")
          done

          # Link dynamic library
          clang -dynamiclib -target "${TARGET}" -isysroot "${SDK}" \
            -install_name @rpath/libusb-1.0.dylib \
            -framework IOKit -framework CoreFoundation -framework Security \
            -lobjc \
            -o "${PREFIX}/lib/libusb-1.0.dylib" \
            "${OBJ[@]}"

          # Copy public header
          cp "${SRC}/libusb.h" "${PREFIX}/include/libusb-1.0/"

          # Verify output
          file "${PREFIX}/lib/libusb-1.0.dylib"

          # Package
          tar -czf "${BUILD_DIR}/libusb-maccatalyst-${{ matrix.arch }}.tar.gz" \
            -C "${STAGE_DIR}" "maccatalyst-${{ matrix.arch }}"

      - name: Upload artifact (macOS)
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v7
        with:
          name: libusb-macos-${{ matrix.arch }}-dylib
          path: ${{ env.BUILD_DIR }}/libusb-macos-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

      - name: Upload artifact (Mac Catalyst)
        if: matrix.platform == 'mac-catalyst'
        uses: actions/upload-artifact@v7
        with:
          name: libusb-maccatalyst-${{ matrix.arch }}-dylib
          path: ${{ env.BUILD_DIR }}/libusb-maccatalyst-${{ matrix.arch }}.tar.gz
          if-no-files-found: error
